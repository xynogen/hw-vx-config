name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Lint & format
        run: |
          uv run --with ruff -- ruff check src/ tests/
          uv run --with ruff -- ruff format --check src/ tests/

      - name: Test on Python 3.10 - 3.13
        run: |
          for ver in 3.10 3.11 3.12 3.13; do
            echo "::group::Python $ver"
            uv run --extra dev --python "$ver" -- pytest tests/ -q
            echo "::endgroup::"
          done
