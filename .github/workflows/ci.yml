name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: uv pip install --system -e ".[dev]"

      - name: Lint & format
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Test
        run: pytest tests/ -q
